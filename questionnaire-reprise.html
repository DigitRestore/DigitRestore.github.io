<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questionnaire de reprise DigitRestore</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
>

<style>
:root {
    --navy: #050814;
    --navy-light: #070c1c;

    --cyan: #4fd2ff;
    --cyan-soft: rgba(79, 210, 255, 0.14);

    --red: #ff4b5c;
    --red-soft: rgba(255, 75, 92, 0.14);

    --white: #f7f8fc;
    --text-soft: #aeb7ce;
    --text-muted: #7f8aa4;

    --border: rgba(138, 171, 204, 0.3);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    color: var(--white);
    font-family: "Poppins", sans-serif;
    background: transparent;
}

button {
    font: inherit;
}

/* =========================
   CONTENEUR
========================= */

.questionnaire {
    width: 100%;
    height: 100%;
    padding: 13px 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background:
        radial-gradient(
            circle at 8% 10%,
            rgba(79, 210, 255, 0.045),
            transparent 34%
        ),
        radial-gradient(
            circle at 92% 90%,
            rgba(255, 75, 92, 0.04),
            transparent 35%
        );
}

#qrRender {
    width: 100%;
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    transition:
        opacity 0.2s ease,
        transform 0.2s ease;
}

#qrRender.leaving {
    opacity: 0;
    transform: translateX(-12px);
}

#qrRender.entering {
    opacity: 0;
    transform: translateX(12px);
}

/* =========================
   PROGRESSION
========================= */

.progress-area {
    flex: 0 0 auto;
    margin-bottom: 12px;
}

.progress-steps {
    display: flex;
    align-items: center;
    gap: 7px;
}

.progress-step {
    position: relative;
    width: 32px;
    height: 32px;
    flex: 0 0 32px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    border: 1px solid rgba(148, 175, 205, 0.35);
    background: rgba(5, 10, 23, 0.88);
    transition:
        color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease,
        transform 0.25s ease;
}

.progress-step.done {
    color: var(--cyan);
    border-color: rgba(79, 210, 255, 0.55);
    background: rgba(79, 210, 255, 0.07);
}

.progress-step.active {
    color: white;
    border-color: var(--cyan);
    background: rgba(79, 210, 255, 0.14);
    box-shadow:
        0 0 12px rgba(79, 210, 255, 0.65),
        inset 0 0 12px rgba(79, 210, 255, 0.12);
    transform: scale(1.08);
    animation: activeStepPulse 2.1s ease-in-out infinite;
}

@keyframes activeStepPulse {
    0%,
    100% {
        box-shadow:
            0 0 10px rgba(79, 210, 255, 0.45),
            inset 0 0 10px rgba(79, 210, 255, 0.08);
    }

    50% {
        box-shadow:
            0 0 19px rgba(79, 210, 255, 0.78),
            inset 0 0 14px rgba(79, 210, 255, 0.16);
    }
}

.progress-line {
    position: relative;
    height: 2px;
    flex: 1;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(141, 168, 198, 0.18);
}

.progress-line.done {
    background: rgba(79, 210, 255, 0.47);
}

.progress-line.done::after {
    content: "";
    position: absolute;
    top: 0;
    left: -60%;
    width: 50%;
    height: 100%;
    background:
        linear-gradient(
            90deg,
            transparent,
            white,
            var(--cyan),
            transparent
        );
    box-shadow: 0 0 8px var(--cyan);
    animation: progressLight 2.5s linear infinite;
}

@keyframes progressLight {
    to {
        left: 120%;
    }
}

/* =========================
   QUESTION
========================= */

.question-body {
    min-height: 0;
    flex: 1;
    padding-right: 5px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color:
        rgba(79, 210, 255, 0.35)
        transparent;
}

.question-body::-webkit-scrollbar {
    width: 5px;
}

.question-body::-webkit-scrollbar-thumb {
    border-radius: 999px;
    background: rgba(79, 210, 255, 0.35);
}

.question-kicker {
    margin-bottom: 4px;
    color: var(--cyan);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
}

.question-title {
    margin-bottom: 4px;
    font-size: clamp(20px, 2.1vw, 27px);
    line-height: 1.2;
    font-weight: 600;
    letter-spacing: -0.02em;
}

.question-description {
    margin-bottom: 12px;
    color: var(--text-soft);
    font-size: 12px;
    line-height: 1.5;
}

/* =========================
   RÉPONSES
========================= */

.options-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
}

.option-button {
    position: relative;
    width: 100%;
    min-height: 57px;
    padding: 10px 13px;
    overflow: hidden;
    border-radius: 10px;
    text-align: left;
    color: var(--white);
    border: 1px solid rgba(139, 169, 202, 0.34);
    background:
        linear-gradient(
            145deg,
            rgba(255, 255, 255, 0.035),
            rgba(255, 255, 255, 0.012)
        ),
        rgba(5, 10, 23, 0.76);
    cursor: pointer;
    transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease;
}

.option-button::after {
    content: "";
    position: absolute;
    top: 0;
    left: -55%;
    width: 42%;
    height: 1px;
    pointer-events: none;
    opacity: 0;
    background:
        linear-gradient(
            90deg,
            transparent,
            white,
            var(--cyan),
            transparent
        );
}

.option-button:hover {
    transform: translateY(-1px);
    border-color: rgba(79, 210, 255, 0.64);
    background:
        linear-gradient(
            145deg,
            rgba(79, 210, 255, 0.065),
            rgba(255, 255, 255, 0.015)
        ),
        rgba(5, 10, 23, 0.84);
}

.option-button:hover::after,
.option-button.selected::after {
    opacity: 1;
    animation: optionLight 1.8s linear infinite;
}

@keyframes optionLight {
    to {
        left: 120%;
    }
}

.option-button.selected {
    border-color: var(--cyan);
    background:
        linear-gradient(
            145deg,
            rgba(79, 210, 255, 0.12),
            rgba(79, 210, 255, 0.025)
        ),
        rgba(5, 12, 27, 0.96);
    box-shadow:
        0 0 14px rgba(79, 210, 255, 0.31),
        inset 0 0 14px rgba(79, 210, 255, 0.045);
}

.option-label {
    display: block;
    margin-bottom: 2px;
    font-size: 14px;
    font-weight: 600;
}

.option-detail {
    display: block;
    color: var(--text-soft);
    font-size: 11px;
    line-height: 1.4;
}

.question-note,
.question-alert {
    margin-top: 9px;
    padding: 9px 11px;
    border-radius: 9px;
    color: var(--text-soft);
    font-size: 10px;
    line-height: 1.45;
    border: 1px solid rgba(139, 169, 202, 0.25);
    background: rgba(255, 255, 255, 0.025);
}

.question-alert {
    color: #f2d5d9;
    border-color: rgba(255, 75, 92, 0.42);
    background: rgba(255, 75, 92, 0.07);
}

/* =========================
   NAVIGATION
========================= */

.question-actions {
    flex: 0 0 auto;
    margin-top: 11px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.question-button {
    min-width: 125px;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        opacity 0.22s ease;
}

.back-button {
    color: var(--white);
    border: 1px solid rgba(139, 169, 202, 0.4);
    background: rgba(255, 255, 255, 0.025);
}

.back-button:not(:disabled):hover {
    transform: translateX(-3px);
    border-color: var(--cyan);
    box-shadow: 0 0 13px rgba(79, 210, 255, 0.2);
}

.continue-button {
    position: relative;
    overflow: hidden;
    color: white;
    border: 1px solid var(--cyan);
    background:
        linear-gradient(
            105deg,
            rgba(79, 210, 255, 0.14),
            rgba(7, 13, 28, 0.96),
            rgba(255, 75, 92, 0.11)
        );
    box-shadow:
        0 0 13px rgba(79, 210, 255, 0.25),
        0 0 12px rgba(255, 75, 92, 0.12);
}

.continue-button::before {
    content: "";
    position: absolute;
    inset: 0;
    left: -110%;
    width: 55%;
    pointer-events: none;
    transform: skewX(-20deg);
    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255, 255, 255, 0.14),
            transparent
        );
    animation: buttonSweep 3.8s ease-in-out infinite;
}

@keyframes buttonSweep {
    0%,
    35% {
        left: -110%;
    }

    75%,
    100% {
        left: 155%;
    }
}

.continue-button:not(:disabled):hover {
    transform: translateY(-2px);
    border-color: var(--red);
    box-shadow:
        0 0 17px rgba(79, 210, 255, 0.32),
        0 0 15px rgba(255, 75, 92, 0.26);
}

.question-button:disabled {
    cursor: not-allowed;
    opacity: 0.28;
    box-shadow: none;
}

/* =========================
   QUESTIONNAIRE TERMINÉ
========================= */

.completion-screen {
    min-height: 0;
    flex: 1;
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.completion-line {
    width: min(290px, 75%);
    height: 2px;
    margin-bottom: 22px;
    border-radius: 999px;
    background:
        linear-gradient(
            90deg,
            transparent,
            var(--cyan),
            white,
            var(--red),
            transparent
        );
    box-shadow:
        0 0 13px rgba(79, 210, 255, 0.35),
        0 0 13px rgba(255, 75, 92, 0.25);
    animation: completionPulse 2.5s ease-in-out infinite;
}

@keyframes completionPulse {
    50% {
        opacity: 0.55;
        transform: scaleX(0.92);
    }
}

.completion-screen h2 {
    margin-bottom: 8px;
    font-size: clamp(22px, 2.3vw, 30px);
    font-weight: 600;
}

.completion-screen p {
    max-width: 480px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.6;
}

.completion-device {
    margin-top: 17px;
    padding: 10px 16px;
    border-radius: 10px;
    color: var(--cyan);
    font-size: 12px;
    border: 1px solid rgba(79, 210, 255, 0.32);
    background: rgba(79, 210, 255, 0.045);
}

.modify-answers-button {
    margin-top: 18px;
    padding: 10px 17px;
    border-radius: 10px;
    color: white;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(139, 169, 202, 0.42);
    background: rgba(255, 255, 255, 0.025);
    transition: 0.22s ease;
}

.modify-answers-button:hover {
    transform: translateY(-2px);
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(79, 210, 255, 0.22);
}

/* =========================
   PETITS ÉCRANS
========================= */

@media (max-width: 720px) {
    .questionnaire {
        padding: 12px;
    }

    .progress-step {
        width: 28px;
        height: 28px;
        flex-basis: 28px;
    }

    .question-title {
        font-size: 21px;
    }

    .question-actions {
        align-items: stretch;
        flex-direction: column-reverse;
    }

    .question-button {
        width: 100%;
    }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
    }
}
</style>
</head>

const MESSAGE_ORIGIN =

/* =========================

/* =========================
   AFFICHAGE
========================= */

function renderQuestion(stepId) {
    const question = questions[stepId];

    if (!question) {
        return;
    }

    questionnaireState.currentStep = stepId;

    sendVisualHelp(question.help);

    qrRender.innerHTML = `
        ${renderProgress(question.stepNumber)}

        <div class="question-body">
            <div class="question-kicker">
                Étape ${question.stepNumber} sur 6
            </div>

            <h2 class="question-title">
                ${escapeHtml(question.title)}
            </h2>

            <p class="question-description">
                ${escapeHtml(question.text)}
            </p>

            <div class="options-list">
                ${renderOptions(question)}
            </div>

            ${
                question.note
                    ? `
                        <div class="question-note">
                            ${escapeHtml(question.note)}
                        </div>
                    `
                    : ""
            }

            ${
                question.alert
                    ? `
                        <div class="question-alert">
                            ${escapeHtml(question.alert)}
                        </div>
                    `
                    : ""
            }
        </div>

        <div class="question-actions">
            <button
                class="question-button back-button"
                type="button"
                id="qrBackButton"
                ${
                    questionnaireState.history.length === 0
                        ? "disabled"
                        : ""
                }
            >
                ← Retour
            </button>

            ${renderContinueButton(question)}
        </div>
    `;

    attachQuestionEvents();
    sendQuestionnaireUpdate(false);
}

function renderProgress(currentStep) {
    let html = `
        <div class="progress-area">
            <div class="progress-steps">
    `;

    for (let step = 1; step <= 6; step += 1) {
        let stepClass = "";

        if (step < currentStep) {
            stepClass = "done";
        } else if (step === currentStep) {
            stepClass = "active";
        }

        html += `
            <div class="progress-step ${stepClass}">
                ${step}
            </div>
        `;

        if (step < 6) {
            html += `
                <div
                    class="progress-line ${
                        step < currentStep ? "done" : ""
                    }"
                ></div>
            `;
        }
    }

    html += `
            </div>
        </div>
    `;

    return html;
}

function renderOptions(question) {
    return question.options
        .map(option => {
            const [value, label, detail] = option;
            const selected =
                isAnswerSelected(question.key, value);

            return `
                <button
                    class="option-button ${
                        selected ? "selected" : ""
                    }"
                    type="button"
                    data-key="${escapeHtml(question.key)}"
                    data-value="${escapeHtml(value)}"
                    aria-pressed="${selected}"
                >
                    <span class="option-label">
                        ${escapeHtml(label)}
                    </span>

                    <span class="option-detail">
                        ${escapeHtml(detail)}
                    </span>
                </button>
            `;
        })
        .join("");
}

function renderContinueButton(question) {
    if (question.type !== "checkbox") {
        return "";
    }

    const values =
        questionnaireState.answers[question.key] || [];

    return `
        <button
            class="question-button continue-button"
            type="button"
            id="qrContinueButton"
            ${values.length === 0 ? "disabled" : ""}
        >
            Continuer →
        </button>
    `;
}

function renderCompletion() {
    const deviceText = [
        questionnaireState.appareil.marque,
        questionnaireState.appareil.version ||
            questionnaireState.appareil.modele,
        questionnaireState.appareil.couleur,
        questionnaireState.appareil.capacite
    ]
        .filter(Boolean)
        .join(" — ");

    qrRender.innerHTML = `
        <div class="completion-screen">
            <div class="completion-line"></div>

            <h2>Questionnaire terminé</h2>

            <p>
                Toutes vos réponses ont été enregistrées.
                Vous pouvez maintenant utiliser le bouton
                « Obtenir mon estimation » situé sous le questionnaire.
            </p>

            ${
                deviceText
                    ? `
                        <div class="completion-device">
                            ${escapeHtml(deviceText)}
                        </div>
                    `
                    : ""
            }

            <button
                class="modify-answers-button"
                type="button"
                id="modifyAnswersButton"
            >
                Modifier ma dernière réponse
            </button>
        </div>
    `;

    document
        .getElementById("modifyAnswersButton")
        .addEventListener("click", returnFromCompletion);

    sendQuestionnaireUpdate(true);
}

/* =========================
   ANIMATIONS ENTRE QUESTIONS
========================= */

function transitionToQuestion(
    nextStep,
    {
        addToHistory = true,
        direction = "forward"
    } = {}
) {
    if (questionnaireState.transitioning) {
        return;
    }

    questionnaireState.transitioning = true;

    qrRender.classList.remove("entering");
    qrRender.classList.add("leaving");

    window.setTimeout(() => {
        if (addToHistory) {
            questionnaireState.history.push(
                questionnaireState.currentStep
            );
        }

        renderQuestion(nextStep);

        qrRender.classList.remove("leaving");
        qrRender.classList.add("entering");

        if (direction === "back") {
            qrRender.style.transform =
                "translateX(-12px)";
        }

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                qrRender.classList.remove("entering");
                qrRender.style.removeProperty("transform");
                questionnaireState.transitioning = false;
            });
        });
    }, 190);
}

function transitionToCompletion() {
    if (questionnaireState.transitioning) {
        return;
    }

    questionnaireState.transitioning = true;

    qrRender.classList.add("leaving");

    window.setTimeout(() => {
        renderCompletion();

        qrRender.classList.remove("leaving");
        qrRender.classList.add("entering");

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                qrRender.classList.remove("entering");
                questionnaireState.transitioning = false;
            });
        });
    }, 190);
}

/* =========================
   INTERACTIONS
========================= */

function attachQuestionEvents() {
    document
        .querySelectorAll(".option-button")
        .forEach(button => {
            button.addEventListener("click", () => {
                selectOption(
                    button.dataset.key,
                    button.dataset.value
                );
            });
        });

    const backButton =
        document.getElementById("qrBackButton");

    if (backButton) {
        backButton.addEventListener(
            "click",
            goBack
        );
    }

    const continueButton =
        document.getElementById("qrContinueButton");

    if (continueButton) {
        continueButton.addEventListener(
            "click",
            validateCheckboxQuestion
        );
    }
}

function selectOption(key, value) {
    if (questionnaireState.transitioning) {
        return;
    }

    const question =
        questions[questionnaireState.currentStep];

    if (!question) {
        return;
    }

    if (question.type === "checkbox") {
        toggleCheckboxAnswer(key, value);

        renderQuestion(
            questionnaireState.currentStep
        );

        return;
    }

    questionnaireState.answers[key] = value;

    clearConditionalAnswers(key, value);
    sendQuestionnaireUpdate(false);

    const selectedButton =
        document.querySelector(
            `.option-button[data-value="${CSS.escape(value)}"]`
        );

    if (selectedButton) {
        document
            .querySelectorAll(".option-button")
            .forEach(button => {
                button.classList.remove("selected");
                button.setAttribute(
                    "aria-pressed",
                    "false"
                );
            });

        selectedButton.classList.add("selected");
        selectedButton.setAttribute(
            "aria-pressed",
            "true"
        );
    }

    const nextStep =
        getNextStep(key, value);

    window.setTimeout(() => {
        if (nextStep === "complete") {
            transitionToCompletion();
            return;
        }

        if (nextStep) {
            transitionToQuestion(nextStep);
        }
    }, 230);
}

function toggleCheckboxAnswer(key, value) {
    const currentValues = Array.isArray(
        questionnaireState.answers[key]
    )
        ? questionnaireState.answers[key]
        : [];

    if (currentValues.includes(value)) {
        questionnaireState.answers[key] =
            currentValues.filter(
                item => item !== value
            );
    } else {
        questionnaireState.answers[key] = [
            ...currentValues,
            value
        ];
    }

    sendQuestionnaireUpdate(false);
}

function validateCheckboxQuestion() {
    const question =
        questions[questionnaireState.currentStep];

    if (!question || question.type !== "checkbox") {
        return;
    }

    const selectedValues =
        questionnaireState.answers[question.key];

    if (
        !Array.isArray(selectedValues) ||
        selectedValues.length === 0
    ) {
        return;
    }

    const nextStep = getNextStep(
        question.key,
        selectedValues
    );

    if (nextStep === "complete") {
        transitionToCompletion();
        return;
    }

    if (nextStep) {
        transitionToQuestion(nextStep);
    }
}

function goBack() {
    if (
        questionnaireState.transitioning ||
        questionnaireState.history.length === 0
    ) {
        return;
    }

    const previousStep =
        questionnaireState.history.pop();

    transitionToQuestion(
        previousStep,
        {
            addToHistory: false,
            direction: "back"
        }
    );
}

function returnFromCompletion() {
    const lastStep =
        questionnaireState.currentStep ||
        "marcheUE";

    sendQuestionnaireUpdate(false);

    transitionToQuestion(
        lastStep,
        {
            addToHistory: false,
            direction: "back"
        }
    );
}

/* =========================
   EMBRANCHEMENTS
========================= */

function getNextStep(key, value) {
    if (key === "fonctionnement") {
        return value === "non"
            ? "defauts"
            : "batterie";
    }

    if (key === "defauts") {
        return "batterie";
    }

    if (key === "batterie") {
        return "ecran";
    }

    if (key === "ecran") {
        return "chassis";
    }

    if (key === "chassis") {
        return "repare";
    }

    if (key === "repare") {
        return value === "oui"
            ? "reparations"
            : "marcheUE";
    }

    if (key === "reparations") {
        return "marcheUE";
    }

    if (key === "marcheUE") {
        return "complete";
    }

    return null;
}

function clearConditionalAnswers(key, value) {
    if (
        key === "fonctionnement" &&
        value === "oui"
    ) {
        questionnaireState.answers.defauts = [];
    }

    if (
        key === "repare" &&
        value !== "oui"
    ) {
        questionnaireState.answers.reparations = [];
    }
}

function isAnswerSelected(key, value) {
    const answer =
        questionnaireState.answers[key];

    if (Array.isArray(answer)) {
        return answer.includes(value);
    }

    return answer === value;
}

/* =========================
   COMMUNICATION AVEC LA PAGE
========================= */

function sendQuestionnaireUpdate(complete) {
    window.parent.postMessage(
        {
            source:
                "digitrestore-questionnaire",

            type:
                "questionnaire-update",

            complete:
                Boolean(complete),

            answers:
                questionnaireState.answers
        },
        MESSAGE_ORIGIN
    );
}

function sendVisualHelp(helpType) {
    window.parent.postMessage(
        {
            source:
                "digitrestore-questionnaire",

            type:
                "visual-help",

            help:
                helpType
        },
        MESSAGE_ORIGIN
    );
}

window.addEventListener("message", event => {
    if (
        MESSAGE_ORIGIN !== "*" &&
        event.origin !== window.location.origin
    ) {
        return;
    }

    const data = event.data;

    if (
        !data ||
        data.source !== "digitrestore-reprise"
    ) {
        return;
    }

    if (data.type === "device-update") {
        questionnaireState.appareil = {
            ...questionnaireState.appareil,
            ...(data.appareil || {})
        };
    }
});

/* =========================
   SÉCURITÉ DU HTML
========================= */

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

/* =========================
   DÉMARRAGE
========================= */

renderQuestion("fonctionnement");
</script>

</body>
</html>
